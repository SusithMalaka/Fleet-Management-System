<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .report-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.08);
        }

        table td, table th {
            text-align: right;
        }

        table th:first-child,
        table td:first-child {
            text-align: left;
        }
    </style>

</head>

<body>

<div class="container mt-4">

    <div class="report-box">

        <!-- TITLE -->
        <h3 class="text-success text-center mb-4">{{ title }}</h3>

        <!-- FILTER ENGINE -->
       {% if filters %}
<form id="filterForm" method="get" class="row g-3 mb-4 justify-content-center">

    {% for col, values in filters.items() %}
    <div class="col-md-3">
        <select name="{{ col }}"
                class="form-select"
                onchange="document.getElementById('filterForm').submit();">

            <option value="ALL">{{ col }} — ALL</option>

            {% for v in values %}
                <option value="{{ v }}"
                {% if request.args.get(col) == v %}selected{% endif %}>
                {{ v }}
                </option>
            {% endfor %}

        </select>
    </div>
    {% endfor %}

    <div class="col-md-2">
        <a href="{{ request.path }}" class="btn btn-secondary w-100">
            Clear Filters
        </a>
    </div>

</form>
{% endif %}
        <!-- TABLE -->
        <div class="table-responsive">
            {{ table | safe }}
        </div>

        <!-- BUTTONS -->
        <div class="text-center mt-4">

            <a href="/report" class="btn btn-secondary me-2">
                Back to Report
            </a>

            <a href="/report/{{ report_key }}/pdf?{{ request.query_string.decode() }}"
               class="btn btn-danger">
               Download PDF
            </a>

        </div>

    </div>

</div>

</body>
</html>
