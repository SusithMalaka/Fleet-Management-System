<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .vehicle-card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .vehicle-card:hover {
            transform: scale(1.05);
        }

        .vehicle-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 8px;
        }

        .vehicle-title {
            text-align: center;
            margin-top: 8px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h3 class="text-success text-center mb-4">
        Click on Vehicle Image to Display Full Delails of the Vehicle
    </h3>

    <div class="row g-4">

        {% for v in vehicles %}
        <div class="col-md-2">

            <a href="/vehicle/{{ v }}" class="text-decoration-none text-dark">

                <div class="vehicle-card">

                    <img src="{{ url_for('static', filename='vehicles/' + v + '.jpg') }}"
                         onerror="this.src='{{ url_for('static', filename='vehicles/default.jpg') }}'">

                    <div class="vehicle-title">
                        {{ v }}
                    </div>

                </div>

            </a>

        </div>
        {% endfor %}

    </div>

    <div class="text-center mt-4">
        <a href="/report" class="btn btn-secondary">
            Back to Reports
        </a>
    </div>

</div>

</body>
</html>
